<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación XV Lupita</title>

<!-- FUENTES -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
html{scroll-behavior:smooth;}
body{background:#000;display:flex;justify-content:center;perspective:1200px;}
.contenedor{max-width:430px;width:100%;transform-style:preserve-3d;transition:transform .2s ease-out;}
.bloque{transform-style:preserve-3d;transition:transform .6s ease;}
.bloque img{width:100%;display:block;}

/* AUDIO BUTTON */
.audio-btn{position:absolute;top:15px;right:15px;width:70px;height:70px;border-radius:50%;background:linear-gradient(145deg,#fff6b7,#ffd700,#d4af37,#b8960c);box-shadow:0 10px 20px rgba(0,0,0,0.6), inset 0 -4px 8px rgba(255,255,255,0.35), inset 0 4px 6px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:30px;color:#fff;cursor:pointer;z-index:10;animation:flotarAudio 3s ease-in-out infinite;}
@keyframes flotarAudio{0%{transform:translateY(0)}50%{transform:translateY(-6px)}100%{transform:translateY(0)}}

/* BLOQUES EFECTO SCROLL */
.bloque{opacity:0;transform:translateY(120px) scale(.85) rotateX(25deg);filter:blur(8px);transition:transform 1.4s cubic-bezier(.19,1,.22,1),opacity 1.2s ease,filter 1.2s ease;transform-origin:center top;will-change:transform,opacity,filter;}
.bloque.visible{opacity:1;transform:translateY(0) scale(1) rotateX(0deg);filter:blur(0);}
.bloque.visible:hover{transform:translateY(-8px);box-shadow:0 20px 40px rgba(0,0,0,0.5),0 0 25px rgba(212,175,55,0.6);}

/* BLOQUES REFLEJO */
.bloque-btn,.bloque-reflejo{position:relative;overflow:hidden;}
.bloque-btn::after,.bloque-reflejo::after{content:"";position:absolute;top:0;left:0;width:50%;height:100%;background:linear-gradient(120deg,rgba(255,255,255,0) 0%,rgba(255,255,255,0.30) 50%,rgba(255,255,255,0) 100%);transform:translateX(-150%) skewX(-20deg);pointer-events:none;animation:shine 3s ease-in-out infinite;}
@keyframes shine{0%{transform:translateX(-150%) skewX(-20deg);opacity:0}20%{opacity:1}60%{transform:translateX(250%) skewX(-20deg);opacity:0}100%{transform:translateX(250%) skewX(-20deg);opacity:0}}

/* PARTICULAS */
.bloque-particulas,.bloque-particulas-xv,.bloque-contador{position:relative;}
canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}

/* CONTADOR */
.countdown{position:absolute;bottom:19%;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:5;}
.time-box{width:68px;height:78px;background:linear-gradient(145deg,#fff8dc 0%,#f7e27c 20%,#d4af37 45%,#b8860b 70%,#fff8dc 100%);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#2c1c00;box-shadow:0 0 18px rgba(212,175,55,0.6);animation:floatGold 3s ease-in-out infinite;}
.time-box span{font-size:26px;font-weight:700;color:#2c1c00;}
.time-box small{font-size:11px;color:#3b2a00;}
@keyframes floatGold{0%{transform:translateY(0)}50%{transform:translateY(-6px)}100%{transform:translateY(0)}}

/* BLOQUE ESTRELLAS */
.bloque-estrellas{position:relative;overflow:hidden;}
.estrella{position:absolute;width:8px;height:8px;background:radial-gradient(circle,rgba(255,255,180,1) 0%,rgba(255,215,0,0.9) 40%,rgba(255,215,0,0.2) 70%,transparent 100%);border-radius:50%;box-shadow:0 0 8px rgba(255,215,0,0.9);animation:destello 2.5s ease-in-out infinite;}
.e1{ top:20%; left:25%; animation-delay:0s; }
.e2{ top:35%; right:20%; animation-delay:.6s; }
.e3{ bottom:30%; left:30%; animation-delay:1.2s; }
.e4{ bottom:20%; right:25%; animation-delay:1.8s; }
@keyframes destello{0%,100%{transform:scale(0.6);opacity:0.4}50%{transform:scale(1.4);opacity:1}}

/* BLOQUE UBICACION */
.bloque-ubicacion{position:relative;height:auto;}
.btn-ubicacion{position:absolute;left:50%;transform:translateX(-50%);display:inline-block;padding:10px 18px;background:linear-gradient(145deg,#fff6b7,#ffd700,#d4af37,#b8960c);color:#fff;font-weight:600;border-radius:12px;text-decoration:none;box-shadow:0 4px 12px rgba(255,215,0,0.7);transition:transform .3s,box-shadow .3s,background .3s;font-size:14px;animation:latido 2s infinite;}
.btn-parroquia{top:9%;}
.btn-salon{top:59%;}
@keyframes latido{0%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.08)}100%{transform:translateX(-50%) scale(1)}}

/* BLOQUE 9 ACORDEON */
.bloque-acordeon{position:relative;overflow:hidden;}
.btn-datos{position:absolute;bottom:20%;left:50%;transform:translateX(-50%);padding:14px 28px;background:linear-gradient(145deg,#ffd700,#b8860b);color:#fff;font-weight:700;border-radius:16px;cursor:pointer;box-shadow:0 8px 0 #c18f00,0 12px 20px rgba(255,215,0,0.5);display:flex;align-items:center;gap:8px;z-index:10;animation:latido 2s infinite;}
.flecha{font-size:14px;animation:rebote 1.2s infinite;}
.panel-datos{position:absolute;top:85%;left:50%;transform:translateX(-50%);width:85%;background:rgba(255,255,255,0.95);border-radius:18px;padding:0 20px;max-height:0;overflow:hidden;transition:max-height .5s ease,padding .4s ease;box-shadow:0 10px 25px rgba(0,0,0,0.2);text-align:left;}
.panel-datos.activo{max-height:200px;padding:20px;}
</style>
</head>
<body>

<div class="contenedor">

  <!-- BLOQUE 1 -->
  <div class="bloque bloque-particulas bloque-fecha">
    <img src="bloque1.webp" alt="Bloque 1">
    <div class="fecha-evento">24 diciembre 2026</div>
    <canvas id="particulas"></canvas>
    <div class="audio-btn" id="btnAudio">▶</div>
  </div>

  <!-- BLOQUE 2 -->
  <div class="bloque bloque-btn">
    <img src="bloque2.webp" alt="Bloque 2">
  </div>

  <!-- BLOQUE 3 PARTICULAS XV -->
  <div class="bloque bloque-particulas-xv">
    <img src="bloque3.webp" alt="Bloque 3">
    <canvas id="particulasXV"></canvas>
  </div>

  <!-- BLOQUE 4 -->
  <div class="bloque bloque-reflejo">
    <img src="bloque4.webp" alt="Bloque 4">
  </div>

  <!-- BLOQUE 5 ESTRELLAS -->
  <div class="bloque bloque-estrellas">
    <img src="bloque5.webp" alt="Bloque 5">
    <span class="estrella e1"></span>
    <span class="estrella e2"></span>
    <span class="estrella e3"></span>
    <span class="estrella e4"></span>
  </div>

  <!-- BLOQUE 6 CONTADOR -->
  <div class="bloque bloque-contador">
    <img src="bloque6.webp" alt="Bloque 6">
    <div class="countdown">
      <div class="time-box"><span id="dias">00</span><small>DÍAS</small></div>
      <div class="time-box"><span id="horas">00</span><small>HRS</small></div>
      <div class="time-box"><span id="minutos">00</span><small>MIN</small></div>
      <div class="time-box"><span id="segundos">00</span><small>SEG</small></div>
    </div>
    <canvas id="particulasCountdown"></canvas>
  </div>

  <!-- BLOQUE 7 UBICACION -->
  <div class="bloque bloque-ubicacion">
    <img src="bloque7.webp" alt="Bloque 7">
    <a href="#" class="btn-ubicacion btn-parroquia">Ver mapa</a>
    <a href="#" class="btn-ubicacion btn-salon">Ver mapa</a>
  </div>

  <!-- BLOQUE 8 REFLEJO -->
  <div class="bloque bloque-reflejo">
    <img src="bloque8.webp" alt="Bloque 8">
  </div>

  <!-- BLOQUE 9 ACORDEON -->
  <div class="bloque bloque-acordeon">
    <img src="bloque9.webp" alt="Bloque 9">
    <div class="btn-datos" onclick="toggleDatos()">Toca aquí <span class="flecha">▼</span></div>
    <div class="panel-datos" id="panelDatos">
      <p><strong>Beneficiario:</strong> María Fernanda López</p>
      <p><strong>Banco:</strong> BBVA Bancomer</p>
      <p><strong>Cuenta:</strong> 012345678901234567</p>
    </div>
  </div>

  <!-- BLOQUE 10 FORMULARIO -->
  <div class="bloque">
    <div style="padding:30px;background:#fff;text-align:center;">
      <h2 style="margin-bottom:15px;color:#d4af37;">Confirmar Asistencia</h2>
      <form id="formConfirmacion" style="display:flex;flex-direction:column;gap:10px;">
        <input type="text" id="nombre" placeholder="Tu nombre" required style="padding:10px;">
        <input type="tel" id="telefono" placeholder="Tu teléfono" required style="padding:10px;">
        <select id="estado" required style="padding:10px;">
          <option value="">¿Asistirás?</option>
          <option value="si">Sí asistiré</option>
          <option value="no">No podré asistir</option>
        </select>
        <input type="number" id="personas" placeholder="Número de personas" min="1" required style="padding:10px;">
        <button type="submit">Confirmar</button>
      </form>
    </div>
  </div>

  <!-- BLOQUE BOTONES OPCIONES -->
  <div class="bloque bloque-botones" style="text-align:center;padding:30px;background:#fff;">
    <h2 style="margin-bottom:15px;color:#d4af37;">Más opciones</h2>
    <button id="btnQR">Ver QR</button>
    <a id="btnCalendario" href="#" target="_blank">Agregar al calendario</a>
    <div id="contenedorQR" style="margin-top:15px;display:none;">
      <img id="imagenQR" src="" alt="QR Invitación" style="width:180px;height:180px;">
    </div>
  </div>

</div>

<audio id="musica" preload="auto" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script type="module">
/* FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-PRgs8oaouJxaCPbwInWGL01O-Ffhbws",
  authDomain: "confirmaciones-boda-de9fb.firebaseapp.com",
  projectId: "confirmaciones-boda-de9fb",
  storageBucket: "confirmaciones-boda-de9fb.firebasestorage.app",
  messagingSenderId: "108154294992",
  appId: "1:108154294992:web:493bab4db7b66b749d84d5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* FORM CONFIRMACIÓN */
document.getElementById("formConfirmacion").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const nombre=document.getElementById("nombre").value;
  const telefono=document.getElementById("telefono").value;
  const estado=document.getElementById("estado").value;
  const personas=document.getElementById("personas").value;
  await addDoc(collection(db,"confirmaciones"),{nombre,telefono,estado,personas:Number(personas),fecha:new Date()});
  alert("Confirmación enviada ❤️");
  e.target.reset();
});

/* AUDIO */
const musica=document.getElementById("musica");
const btnAudio=document.getElementById("btnAudio");
let activo=false;
btnAudio.addEventListener("click",()=>{
  if(!activo){musica.play();btnAudio.innerHTML="⏸";activo=true;}else{musica.pause();btnAudio.innerHTML="▶";activo=false;}
});

/* ACORDEÓN */
function toggleDatos(){document.getElementById("panelDatos").classList.toggle("activo");}

/* SCROLL ANIMACIÓN */
const bloques=document.querySelectorAll('.bloque');
const obs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('visible');});},{threshold:0,rootMargin:"0px 0px -80px 0px"});
bloques.forEach(b=>obs.observe(b));
window.addEventListener("load",()=>{bloques.forEach(b=>{if(b.getBoundingClientRect().top<window.innerHeight*1.1)b.classList.add('visible');});});
setTimeout(()=>{bloques.forEach(b=>b.classList.add('visible'));},1200);

/* PARTICULAS BLOQUE 1 */
const c1=document.getElementById("particulas");const x1=c1.getContext("2d");function rs1(){c1.width=c1.offsetWidth;c1.height=c1.offsetHeight}rs1();addEventListener("resize",rs1);
let p1=[];for(let i=0;i<40;i++)p1.push({x:Math.random()*c1.width,y:Math.random()*c1.height,dx:(Math.random()-.5)*.6,dy:(Math.random()-.5)*.6,r:Math.random()*2+1,a:Math.random()});
function loop1(){x1.clearRect(0,0,c1.width,c1.height);p1.forEach(p=>{x1.beginPath();x1.arc(p.x,p.y,p.r,0,Math.PI*2);x1.fillStyle=`rgba(255,215,0,${p.a})`;x1.fill();p.x+=p.dx;p.y+=p.dy;if(p.x<0||p.x>c1.width)p.dx*=-1;if(p.y<0||p.y>c1.height)p.dy*=-1;});requestAnimationFrame(loop1);}loop1();

/* PARTICULAS BLOQUE XV */
const cXV=document.getElementById("particulasXV");const xXV=cXV.getContext("2d");function resizeXV(){cXV.width=cXV.offsetWidth;cXV.height=cXV.offsetHeight}resizeXV();window.addEventListener("resize",resizeXV);
let pXV=[];for(let i=0;i<40;i++){pXV.push({x:Math.random()*cXV.width,y:Math.random()*cXV.height,dx:(Math.random()-.5)*1,dy:(Math.random()-.5)*1,r:Math.random()*2+1,a:Math.random()});}
function loopXV(){xXV.clearRect(0,0,cXV.width,cXV.height);pXV.forEach((p,i)=>{xXV.beginPath();xXV
.fillStyle = `rgba(255,215,0,${p.a})`;
    xXV.shadowBlur = 6;
    xXV.shadowColor = "rgba(255,223,0,0.8)";
    xXV.fill();
    p.x += p.dx;
    p.y += p.dy;
    if (p.x < 0 || p.x > cXV.width) p.dx *= -1;
    if (p.y < 0 || p.y > cXV.height) p.dy *= -1;
  });
  requestAnimationFrame(loopXV);
}
loopXV();

/* CONTADOR */
const fechaEvento = new Date("2026-12-24T22:00:00").getTime();
setInterval(() => {
  const d = Math.max(0, fechaEvento - Date.now());
  document.getElementById("dias").innerText = Math.floor(d/86400000).toString().padStart(2,"0");
  document.getElementById("horas").innerText = (Math.floor(d/3600000)%24).toString().padStart(2,"0");
  document.getElementById("minutos").innerText = (Math.floor(d/60000)%60).toString().padStart(2,"0");
  document.getElementById("segundos").innerText = (Math.floor(d/1000)%60).toString().padStart(2,"0");
}, 1000);

/* PARTICULAS CONTADOR */
const cC = document.getElementById("particulasCountdown");
const xC = cC.getContext("2d");
function rsC(){ cC.width = cC.offsetWidth; cC.height = cC.offsetHeight; }
rsC(); window.addEventListener("resize", rsC);
let pC = [];
function spawn(){
  return {
    x: cC.width/2 + (Math.random()*200 - 100),
    y: cC.height*0.75,
    dx: (Math.random()-.5)*1.2,
    dy: -Math.random()*2-1,
    r: Math.random()*2+1,
    a: 1
  };
}
function loopC(){
  xC.clearRect(0,0,cC.width,cC.height);
  if(pC.length<120)pC.push(spawn());
  pC.forEach((p,i)=>{
    xC.beginPath();
    xC.arc(p.x,p.y,p.r,0,Math.PI*2);
    xC.fillStyle=`rgba(212,175,55,${p.a})`;
    xC.fill();
    p.x += p.dx; p.y += p.dy; p.a -= .015;
    if(p.a <= 0)pC.splice(i,1);
  });
  requestAnimationFrame(loopC);
}
loopC();

/* BOTON QR */
const btnQR = document.getElementById("btnQR");
const contQR = document.getElementById("contenedorQR");
const imgQR = document.getElementById("imagenQR");
btnQR.addEventListener("click", () => {
  const urlInvitacion = window.location.href;
  const qr = new QRious({value:urlInvitacion, size:180});
  imgQR.src = qr.toDataURL();
  contQR.style.display = contQR.style.display === "none" ? "block" : "none";
});

/* BOTON CALENDARIO */
const btnCalendario = document.getElementById("btnCalendario");
btnCalendario.addEventListener("click", () => {
  const start = "20261217T170000";
  const end = "20261217T230000";
  const title = "XV de Lupita";
  const details = "Celebración del XV de Lupita";
  const location = "Dirección del evento";
  const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${start}/${end}&details=${encodeURIComponent(details)}&location=${encodeURIComponent(location)}`;
  btnCalendario.href = url;
});
</script>

</body>
</html>
